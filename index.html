<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MencBoard - Kanban Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a1929;
            --bg-board: #0d2137;
            --bg-surface: #132f4c;
            --list-bg: #1a3a5c;
            --card-bg: #1e4976;
            --card-hover: #245a8a;
            --text-primary: #e3f2fd;
            --text-secondary: #8eaccd;
            --text-muted: #5a7fa0;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(0,180,216,0.4);
            --accent: #00b4d8;
            --accent-dark: #0096b7;
            --accent-glow: rgba(0,180,216,0.25);
            --accent-green: #4caf50;
            --accent-yellow: #ffd600;
            --accent-orange: #ff9800;
            --accent-red: #f44336;
            --accent-purple: #ab47bc;
            --accent-pink: #ec407a;
            --accent-teal: #26a69a;
            --accent-lime: #c6ff00;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(0,180,216,0.15);
            --radius: 10px;
            --radius-sm: 6px;
            --radius-lg: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(13, 33, 55, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 800;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 8px 12px 8px 36px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            width: 240px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px var(--accent-glow); }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            font-family: inherit;
        }

        .header-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); border-color: var(--border-hover); }
        .header-btn .material-icons-outlined { font-size: 17px; }

        .sync-status {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-right: 8px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 6px rgba(76,175,80,0.5);
            transition: all 0.3s;
        }
        .sync-dot.syncing {
            background: var(--accent-yellow);
            box-shadow: 0 0 8px rgba(255,214,0,0.6);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        /* ===== BOARD TABS ===== */
        .board-selector {
            background: rgba(0,0,0,0.2);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }

        .board-selector::-webkit-scrollbar { height: 0; }

        .board-tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 7px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: var(--transition);
            font-family: inherit;
        }

        .board-tab.active {
            background: rgba(0,180,216,0.15);
            color: var(--accent);
            border-color: rgba(0,180,216,0.3);
            font-weight: 600;
        }

        .board-tab:hover:not(.active) { background: rgba(255,255,255,0.08); color: var(--text-primary); }

        .board-tab.add-board {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.15);
            color: var(--text-muted);
        }

        .board-tab.add-board:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== BOARD ===== */
        .board {
            display: flex;
            gap: 14px;
            padding: 16px 20px;
            align-items: flex-start;
            overflow-x: auto;
            min-height: calc(100vh - 112px);
        }

        .board::-webkit-scrollbar { height: 8px; }
        .board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* ===== LISTS ===== */
        .list {
            background: var(--list-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            min-width: 300px;
            max-width: 300px;
            max-height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .list-header {
            padding: 14px 14px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            border: none;
            background: transparent;
            width: 100%;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            letter-spacing: -0.2px;
        }

        .list-title:focus {
            background: rgba(0,0,0,0.3);
            outline: 2px solid var(--accent);
            cursor: text;
            color: white;
        }

        .list-count {
            background: rgba(255,255,255,0.08);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .list-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            border-radius: var(--radius-sm);
            display: flex;
            transition: var(--transition);
        }

        .list-menu-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .list-cards {
            padding: 0 10px;
            overflow-y: auto;
            flex: 1;
            min-height: 8px;
        }

        .list-cards::-webkit-scrollbar { width: 4px; }
        .list-cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .list-footer { padding: 8px 10px 10px; }

        .add-card-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            padding: 8px 10px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
        }

        .add-card-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
        .add-card-btn .material-icons-outlined { font-size: 18px; }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid transparent;
            border-radius: var(--radius);
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
        }

        .card:hover {
            box-shadow: var(--shadow-md), var(--shadow-glow);
            transform: translateY(-1px);
        }

        .card.dragging { opacity: 0.4; transform: rotate(2deg) scale(1.02); }

        .card-labels {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .card-label {
            height: 8px;
            min-width: 40px;
            border-radius: 4px;
            transition: var(--transition);
            cursor: pointer;
        }

        .card-label.expanded {
            height: 22px;
            font-size: 11px;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-weight: 600;
            border-radius: 4px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            word-wrap: break-word;
            font-weight: 500;
        }

        .card-badges {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .card-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-badge .material-icons-outlined { font-size: 14px; }

        .card-badge.overdue { color: white; background: var(--accent-red); padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .card-badge.due-soon { color: #1a1a1a; background: var(--accent-yellow); padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .card-badge.complete { color: white; background: var(--accent-green); padding: 2px 8px; border-radius: 4px; font-weight: 500; }

        /* ===== ADD LIST ===== */
        .add-list {
            min-width: 300px;
            max-width: 300px;
            flex-shrink: 0;
        }

        .add-list-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: var(--radius-lg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
        }

        .add-list-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); border-color: var(--accent); }

        .add-list-form {
            background: var(--list-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 10px;
            display: none;
        }

        .add-list-form.active { display: block; }

        .add-list-form input, .add-card-form textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--accent);
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            font-family: inherit;
            background: rgba(0,0,0,0.3);
            color: var(--text-primary);
        }

        .add-list-form input::placeholder, .add-card-form textarea::placeholder { color: var(--text-muted); }

        .add-card-form textarea {
            resize: none;
            min-height: 60px;
            border: none;
            background: var(--card-bg);
            box-shadow: var(--shadow-sm);
            border-radius: var(--radius);
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-primary:hover { box-shadow: 0 4px 12px var(--accent-glow); }

        .btn-cancel {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            transition: var(--transition);
        }

        .btn-cancel:hover { color: var(--text-primary); }

        .add-card-form {
            display: none;
            padding: 0 10px 10px;
        }

        .add-card-form.active { display: block; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 200;
            padding: 40px 16px;
            overflow-y: auto;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 780px;
            position: relative;
            box-shadow: var(--shadow-lg);
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            z-index: 1;
            transition: var(--transition);
        }

        .modal-close:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

        .modal-header {
            padding: 20px 24px 12px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .modal-header .material-icons-outlined { font-size: 26px; color: var(--accent); margin-top: 4px; }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            border: none;
            background: transparent;
            width: 100%;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .modal-title:focus { background: rgba(0,0,0,0.3); outline: 2px solid var(--accent); }

        .modal-list-name {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 20px;
            padding: 8px 24px 24px;
        }

        .modal-main { min-width: 0; }
        .modal-section { margin-bottom: 28px; }

        .modal-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .modal-section-title .material-icons-outlined { font-size: 18px; color: var(--accent); }

        /* ===== LABEL PICKER ===== */
        .label-picker { display: flex; flex-direction: column; gap: 0; }

        .label-picker-item {
            display: flex;
            align-items: center;
            gap: 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            overflow: hidden;
            margin-bottom: 4px;
        }

        .label-bar {
            flex: 1;
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: relative;
            transition: var(--transition);
        }

        .label-bar:hover { opacity: 0.85; filter: brightness(1.1); }

        .label-bar.selected { box-shadow: inset 0 0 0 2px white, 0 0 8px rgba(255,255,255,0.3); }

        .label-bar.selected::after {
            content: '\\2713';
            position: absolute;
            right: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
        }

        .label-edit-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.06);
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            transition: var(--transition);
            flex-shrink: 0;
            margin-left: 4px;
        }

        .label-edit-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

        /* Label edit panel */
        .label-edit-panel {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 8px;
            display: none;
        }

        .label-edit-panel.active { display: block; }

        .label-edit-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .label-edit-color {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .label-edit-color input[type="color"] {
            position: absolute;
            inset: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            cursor: pointer;
            background: none;
        }

        .label-edit-name {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .label-edit-name:focus { border-color: var(--accent); }

        .label-edit-actions {
            display: flex;
            gap: 6px;
        }

        .label-edit-actions button {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            transition: var(--transition);
        }

        .label-save-btn { background: var(--accent); color: white; }
        .label-save-btn:hover { opacity: 0.9; }
        .label-remove-btn { background: rgba(244,67,54,0.15); color: var(--accent-red); }
        .label-remove-btn:hover { background: rgba(244,67,54,0.25); }

        .add-label-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px dashed rgba(255,255,255,0.15);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px 12px;
            margin-top: 8px;
            font-family: inherit;
            transition: var(--transition);
            border-radius: var(--radius-sm);
            width: 100%;
        }

        .add-label-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* ===== FORM ELEMENTS ===== */
        .modal-description {
            width: 100%;
            min-height: 100px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            background: rgba(0,0,0,0.2);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--transition);
        }

        .modal-description:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .modal-description::placeholder { color: var(--text-muted); }

        .due-date-input {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            width: 100%;
            background: rgba(0,0,0,0.2);
            color: var(--text-primary);
            color-scheme: dark;
            transition: var(--transition);
        }

        .due-date-input:focus { border-color: var(--accent); outline: none; }

        /* ===== CHECKLIST ===== */
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 4px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .checklist-item:hover { background: rgba(255,255,255,0.03); }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .checklist-item input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            outline: none;
        }

        .checklist-item input[type="text"]:focus { background: rgba(0,0,0,0.2); }

        .checklist-progress {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .checklist-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-green));
            transition: width 0.4s;
            border-radius: 3px;
        }

        .add-checklist-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;

        /* ===== ATTACHMENTS ===== */
        .attachment-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;

        .attachment-icon {
            width: 40px;
            height: 40px;
            background: rgba(0,180,216,0.1);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .attachment-icon .material-icons-outlined { color: var(--accent); font-size: 20px; }

        .attachment-info { flex: 1; min-width: 0; }
        .attachment-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .attachment-size { font-size: 11px; color: var(--text-muted); }

        .attachment-preview {
            width: 80px;
            height: 50px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
        }

        /* ===== COMMENTS ===== */
        .comment-input-wrapper { display: flex; gap: 8px; margin-bottom: 16px; }

        .comment-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            background: rgba(0,0,0,0.2);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);

        .comment-input:focus { border-color: var(--accent); }
        .comment-input::placeholder { color: var(--text-muted); }

        .comment { display: flex; gap: 10px; margin-bottom: 14px; }

        .comment-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            color: white;
            font-size: 13px;
            font-weight: 700;
            display: flex;

            justify-content: center;

        .comment-body { flex: 1; }

        .comment-date { font-size: 11px; color: var(--text-muted); margin-left: 8px; }
        .comment-text { font-size: 14px; margin-top: 4px; background: rgba(0,0,0,0.15); padding: 10px 12px; border-radius: var(--radius); line-height: 1.5; border: 1px solid var(--border); }

        /* ===== SIDEBAR ===== */
        .sidebar-section { margin-bottom: 20px; }

        .sidebar-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: rgba(255,255,255,0.04);

            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            transition: var(--transition);
            font-family: inherit;
        }

        .sidebar-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .sidebar-btn .material-icons-outlined { font-size: 16px; }
        .sidebar-btn.danger { color: var(--accent-red); }
        .sidebar-btn.danger:hover { background: rgba(244,67,54,0.12); }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            position: fixed;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 6px;
            min-width: 220px;
            z-index: 300;
            display: none;
        }

        .context-menu.active { display: block; }

        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border: none;
            background: none;
            width: 100%;
            cursor: pointer;
            font-size: 13px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition);
        }

        .context-menu-item:hover { background: rgba(255,255,255,0.06); }
        .context-menu-item.danger { color: var(--accent-red); }
        .context-menu-item .material-icons-outlined { font-size: 17px; color: var(--text-muted); }
        .context-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

        /* ===== TOAST ===== */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 400; }

        .toast {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s, fadeOut 0.3s 2.7s;
            box-shadow: var(--shadow-md);
        }

        .toast.error { background: var(--accent-red); }
        .toast.warning { background: var(--accent-orange); }

        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Drag placeholder */
        .drag-placeholder {
            background: rgba(0,180,216,0.08);
            border: 2px dashed rgba(0,180,216,0.25);
            border-radius: var(--radius);
            margin-bottom: 8px;

        }

        .card.search-hidden { display: none; }

        /* File input hidden */
        .file-input-hidden { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .modal-body { grid-template-columns: 1fr; }
            .list { min-width: 270px; max-width: 270px; }
            .search-input { width: 140px; }
        }
    </style>
</head>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
    apiKey: "AIzaSyDUp3Gv1fF2yu0Thx4JWiIyBoeR8rj1r7Q",
    authDomain: "mencboard.firebaseapp.com",
    databaseURL: "https://mencboard-default-rtdb.firebaseio.com",
    projectId: "mencboard",
    storageBucket: "mencboard.firebasestorage.app",
    messagingSenderId: "326927488814",
    appId: "1:326927488814:web:e45510660b8c4897814cbf",
    measurementId: "G-KP6G76D5TQ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;
let dbRef = null;
let saveTimeout = null;

let googleAccessToken = null;
let isSaving = false; // Firebase yazma sırasında kendi listener'ımızı yoksay

// Mobil cihaz tespiti
function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// ===== GOOGLE AUTH =====
function googleSignIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.file');
    if (isMobile()) {
        // Mobilde redirect kullan (popup engelleniyor)
        auth.signInWithRedirect(provider);
    } else {
        // Masaüstünde popup kullan
        auth.signInWithPopup(provider).then(result => {
            const credential = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
            if (credential) {
                googleAccessToken = credential.accessToken;
            }
        }).catch(e => showToast('Giriş başarısız: ' + e.message, 'error'));
    }
}

// Redirect sonrası token'ı yakala (mobil için)
auth.getRedirectResult().then(result => {
    if (result && result.credential) {
        googleAccessToken = result.credential.accessToken;
    }
}).catch(e => {
    if (e.code !== 'auth/null-user') console.error('Redirect hatası:', e);
});

function refreshGoogleToken() {
    if (!currentUser) return Promise.reject('Giriş yapılmamış');
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/drive.file');
    if (isMobile()) {
        return auth.currentUser.reauthenticateWithRedirect(provider);
    } else {
        return auth.currentUser.reauthenticateWithPopup(provider).then(result => {
            const credential = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
            if (credential) googleAccessToken = credential.accessToken;
            return googleAccessToken;
        });
    }
}

function signOut() {
    if (confirm('Çıkış yapmak istediğinize emin misiniz?')) {
        auth.signOut();
    }
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        dbRef = db.ref('users/' + user.uid);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appHeader').style.display = 'flex';
        document.getElementById('boardSelector').style.display = 'flex';
        document.getElementById('board').style.display = 'flex';
        document.getElementById('userPhoto').src = user.photoURL || '';
        document.getElementById('userDisplayName').textContent = user.displayName || user.email;
        loadStateFromFirebase();
    } else {
        currentUser = null;
        dbRef = null;
        googleAccessToken = null;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appHeader').style.display = 'none';
        document.getElementById('boardSelector').style.display = 'none';
        document.getElementById('board').style.display = 'none';
    }
});

// ===== STATE =====
let state = { boards: [], activeBoardId: null, googleToken: null };
let currentCardId = null;
let draggedCard = null;
let labelsExpanded = true;

const DEFAULT_LABELS = [
    { id: 'green', color: '#4caf50', name: 'Tamamlandı' },
    { id: 'yellow', color: '#ffd600', name: 'Beklemede' },
    { id: 'orange', color: '#ff9800', name: 'Acil' },
    { id: 'red', color: '#f44336', name: 'Kritik' },
    { id: 'purple', color: '#ab47bc', name: 'Tasarım' },
    { id: 'blue', color: '#00b4d8', name: 'Geliştirme' },
    { id: 'pink', color: '#ec407a', name: 'Bug' },
    { id: 'teal', color: '#26a69a', name: 'Test' }
];

// ===== UTILS =====
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }); }
function getDueDateStatus(d) { if (!d) return ''; const diff = new Date(d) - new Date(); if (diff < 0) return 'overdue'; if (diff < 86400000) return 'due-soon'; return ''; }
function formatFileSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB'; return (bytes/1048576).toFixed(1) + ' MB'; }

function showToast(msg, type = 'info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'error' ? ' error' : type === 'warning' ? ' warning' : '');
    t.innerHTML = `<span class="material-icons-outlined" style="font-size:18px">${{info:'check_circle',success:'check_circle',error:'error',warning:'warning'}[type]||'check_circle'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ===== STATE MANAGEMENT =====
function saveState() {
    // Yerel yedek
    localStorage.setItem('mencboard_data', JSON.stringify(state.boards));
    localStorage.setItem('mencboard_activeBoard', state.activeBoardId);

    // Firebase'e kaydet (debounce - 500ms)
    if (dbRef) {
        document.getElementById('syncDot').className = 'sync-dot syncing';
        document.getElementById('syncText').textContent = 'Kaydediliyor...';
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            // Attachment data (base64) çok büyük olabilir, sadece metadata kaydet
            const boardsForDB = JSON.parse(JSON.stringify(state.boards));
            boardsForDB.forEach(board => {
                board.lists.forEach(list => {
                    list.cards.forEach(card => {
                        if (card.attachments) {
                            card.attachments = card.attachments.map(att => ({
                                id: att.id, name: att.name, size: att.size,
                                type: att.type, addedAt: att.addedAt,
                                driveFileId: att.driveFileId || null,
                                driveUrl: att.driveUrl || null
                                // data alanı Firebase'e gönderilmez (çok büyük)
                            }));
                        }
                    });
                });
            });
            isSaving = true;
            dbRef.set({
                boards: boardsForDB,
                activeBoardId: state.activeBoardId,
                lastUpdated: new Date().toISOString()
            }).then(() => {
                setTimeout(() => { isSaving = false; }, 200);
                document.getElementById('syncDot').className = 'sync-dot';
                document.getElementById('syncText').textContent = 'Kaydedildi';
            }).catch(e => {
                isSaving = false;
                document.getElementById('syncDot').className = 'sync-dot';
                document.getElementById('syncText').textContent = 'Hata!';
                console.error('Firebase kayıt hatası:', e);
            });
        }, 500);
    } else {
        document.getElementById('syncDot').className = 'sync-dot';
        document.getElementById('syncText').textContent = 'Yerel';
    }
}

function loadState() {
    const b = localStorage.getItem('mencboard_data');
    if (b) state.boards = JSON.parse(b);
    state.activeBoardId = localStorage.getItem('mencboard_activeBoard');
    if (!state.boards.length) createDefaultBoard();
    if (!state.activeBoardId || !state.boards.find(x => x.id === state.activeBoardId)) state.activeBoardId = state.boards[0].id;
}

function loadStateFromFirebase() {
    if (!dbRef) return;
    document.getElementById('syncDot').className = 'sync-dot syncing';
    document.getElementById('syncText').textContent = 'Yükleniyor...';
    dbRef.once('value').then(snapshot => {
        const data = snapshot.val();
        if (data && data.boards && data.boards.length > 0) {
            state.boards = data.boards;
            state.activeBoardId = data.activeBoardId || state.boards[0]?.id;
            // Yerel storage'ı da güncelle
            localStorage.setItem('mencboard_data', JSON.stringify(state.boards));
            localStorage.setItem('mencboard_activeBoard', state.activeBoardId);
        } else {
            // Firebase'de veri yoksa yerel verileri yükle
            loadState();
            // Ve Firebase'e kaydet
            saveState();
        }
        renderBoardTabs(); renderBoard();
        document.getElementById('syncDot').className = 'sync-dot';
        document.getElementById('syncText').textContent = 'Kaydedildi';
    }).catch(e => {
        console.error('Firebase yükleme hatası:', e);
        loadState();
        renderBoardTabs(); renderBoard();
        document.getElementById('syncDot').className = 'sync-dot';
        document.getElementById('syncText').textContent = 'Çevrimdışı';
    });

    // Gerçek zamanlı dinleme (başka cihazdan yapılan değişiklikleri al)
    dbRef.on('value', snapshot => {
        if (isSaving) return; // Kendi yazdığımız veriyi tekrar yükleme
        const data = snapshot.val();
        if (data && data.boards) {
            state.boards = data.boards;
            state.activeBoardId = data.activeBoardId || state.boards[0]?.id;
            localStorage.setItem('mencboard_data', JSON.stringify(state.boards));
            renderBoardTabs(); renderBoard();
        }
    });
}

function createCardElement(card, listId) {
    const el = document.createElement('div'); el.className = 'card'; el.dataset.cardId = card.id; el.draggable = true;
    el.ondragstart = (e) => { draggedCard = { cardId: card.id, sourceListId: listId }; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => el.classList.add('dragging'), 0); e.stopPropagation(); };
    el.ondragend = () => { el.classList.remove('dragging'); draggedCard = null; };
    el.onclick = () => openCardModal(card.id, listId);

    const labels = getBoardLabels();
    // Kart rengini ilk etikete göre ayarla
    if (card.labels?.length) {
        const primaryLabel = labels.find(x => x.id === card.labels[0]);
        if (primaryLabel) {
            el.style.borderLeftColor = primaryLabel.color;
            el.style.background = `linear-gradient(135deg, ${primaryLabel.color}18 0%, var(--card-bg) 100%)`;
            el.onmouseenter = () => { el.style.background = `linear-gradient(135deg, ${primaryLabel.color}28 0%, var(--card-hover) 100%)`; };
            el.onmouseleave = () => { el.style.background = `linear-gradient(135deg, ${primaryLabel.color}18 0%, var(--card-bg) 100%)`; };
        }
    }

    let html = '';
    if (card.labels?.length) {
        html += '<div class="card-labels" onclick="event.stopPropagation()">';
        card.labels.forEach(lid => {
            const l = labels.find(x => x.id === lid);
            if (l) html += `<div class="card-label expanded" style="background:${l.color}">${escapeHtml(l.name)}</div>`;
        });
        html += '</div>';
    }
    html += `<div class="card-title">${escapeHtml(card.title)}</div>`;

    const badges = [];
    if (card.dueDate) badges.push(`<span class="card-badge ${getDueDateStatus(card.dueDate)}"><span class="material-icons-outlined">schedule</span>${formatDate(card.dueDate)}</span>`);
    if (card.description) badges.push('<span class="card-badge"><span class="material-icons-outlined">subject</span></span>');
    if (card.checklist?.length) { const d = card.checklist.filter(i => i.checked).length; badges.push(`<span class="card-badge ${d === card.checklist.length ? 'complete' : ''}"><span class="material-icons-outlined">check_box</span>${d}/${card.checklist.length}</span>`); }
    if (card.comments?.length) badges.push(`<span class="card-badge"><span class="material-icons-outlined">chat_bubble_outline</span>${card.comments.length}</span>`);
    if (card.attachments?.length) badges.push(`<span class="card-badge"><span class="material-icons-outlined">attachment</span>${card.attachments.length}</span>`);
    if (badges.length) html += `<div class="card-badges">${badges.join('')}</div>`;

    el.innerHTML = html;
    return el;
}

// ===== DRAG & DROP =====
function handleDragOver(e) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const c = e.currentTarget;
    if (!c.querySelector('.drag-placeholder')) { const ph = document.createElement('div'); ph.className = 'drag-placeholder'; c.appendChild(ph); }
    const after = getDragAfterElement(c, e.clientY);
    const ph = c.querySelector('.drag-placeholder');
    if (after) c.insertBefore(ph, after); else c.appendChild(ph);
}

function handleDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) { const ph = e.currentTarget.querySelector('.drag-placeholder'); if (ph) ph.remove(); } }

function handleDrop(e, targetListId) {
    e.preventDefault();
    const c = e.currentTarget; const ph = c.querySelector('.drag-placeholder');
    if (draggedCard) {
        const board = getActiveBoard();
        const src = board.lists.find(l => l.id === draggedCard.sourceListId);
        const tgt = board.lists.find(l => l.id === targetListId);
        const ci = src.cards.findIndex(x => x.id === draggedCard.cardId);
        const [card] = src.cards.splice(ci, 1);
        if (ph) { let idx = 0; for (let i = 0; i < c.children.length; i++) { if (c.children[i] === ph) break; if (c.children[i].classList.contains('card')) idx++; } tgt.cards.splice(idx, 0, card); }
        else tgt.cards.push(card);
        saveState(); renderBoard();
    }
    if (ph) ph.remove();
}

function getDragAfterElement(c, y) {
    return [...c.querySelectorAll('.card:not(.dragging)')].reduce((cl, ch) => {
        const box = ch.getBoundingClientRect(); const off = y - box.top - box.height / 2;
        return off < 0 && off > cl.offset ? { offset: off, element: ch } : cl;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

    const labels = getBoardLabels();

function addNewLabel(card) {
    const labels = getBoardLabels();

    const usedColors = labels.map(l => l.color);

// ===== ATTACHMENTS =====
function uploadToDrive(file) {
    return new Promise((resolve, reject) => {
        if (!googleAccessToken) {
            // Token yoksa yeniden auth iste
            return refreshGoogleToken().then(() => uploadToDrive(file).then(resolve).catch(reject))
                .catch(() => reject('Google Drive erişim izni yok. Tekrar giriş yapın.'));
        }
        const metadata = {
            name: file.name,
            mimeType: file.type,
            parents: ['root'] // Drive ana klasör
        };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);

        fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + googleAccessToken },
            body: form
        }).then(res => {
            if (res.status === 401) {
                // Token expired, refresh
                googleAccessToken = null;
                return refreshGoogleToken().then(() => uploadToDrive(file)).then(resolve).catch(reject);
            }
            if (!res.ok) throw new Error('Drive yükleme hatası: ' + res.status);
            return res.json();
        }).then(data => {
            if (data) resolve(data);
        }).catch(reject);
    });
}

function handleFileUpload(files) {
    const card = getCurrentCard(); if (!card || !files.length) return;
    if (!card.attachments) card.attachments = [];
    const fileCount = files.length;
    let uploaded = 0;

    [...files].forEach(file => {
        // Önce base64 olarak yerel kaydet (anında gösterim için)
        const reader = new FileReader();
        reader.onload = (e) => {
            const attachment = {
                id: generateId(), name: file.name, size: file.size,
                type: file.type, data: e.target.result, addedAt: new Date().toISOString(),
                driveFileId: null, driveUrl: null, uploading: true
            };
            card.attachments.push(attachment);
            renderAttachments(card); renderBoard();

            // Google Drive'a yükle (arka planda)
            if (googleAccessToken) {
                uploadToDrive(file).then(driveData => {
                    attachment.driveFileId = driveData.id;
                    attachment.driveUrl = driveData.webViewLink || driveData.webContentLink;
                    attachment.uploading = false;
                    saveState(); renderAttachments(card);
                    uploaded++;
                    if (uploaded === fileCount) showToast(`${fileCount} dosya Drive'a yüklendi`, 'success');
                }).catch(err => {
                    console.error('Drive yükleme hatası:', err);
                    attachment.uploading = false;
                    saveState(); renderAttachments(card);
                    showToast('Drive yükleme başarısız: ' + (err.message || err), 'warning');
                });
            } else {
                // Drive token yok, sadece yerel kaydet
                attachment.uploading = false;
                saveState(); renderAttachments(card);
                uploaded++;
                if (uploaded === fileCount) showToast(`${fileCount} dosya eklendi (yerel)`, 'info');
            }
        };
        reader.readAsDataURL(file);
    });
    document.getElementById('fileInput').value = '';
}

function renderAttachments(card) {
    if (!card.attachments) card.attachments = [];
    const c = document.getElementById('attachmentsList'); c.innerHTML = '';
    card.attachments.forEach((att, idx) => {
        const el = document.createElement('div'); el.className = 'attachment-item';
        const isImage = att.type?.startsWith('image/');
        const hasDrive = att.driveUrl || att.driveFileId;
        const statusIcon = att.uploading ? '<span class="material-icons-outlined" style="font-size:14px;color:#ffd600;animation:spin 1s linear infinite;">sync</span>' :
            hasDrive ? '<span class="material-icons-outlined" style="font-size:14px;color:#4caf50;" title="Google Drive\'da">cloud_done</span>' :
            '<span class="material-icons-outlined" style="font-size:14px;color:#ff9800;" title="Sadece yerel">computer</span>';
        el.innerHTML = `
            <div class="attachment-icon"><span class="material-icons-outlined">${isImage ? 'image' : 'insert_drive_file'}</span></div>
            <div class="attachment-info">
                <div class="attachment-name">${escapeHtml(att.name)} ${statusIcon}</div>
                <div class="attachment-size">${formatFileSize(att.size || 0)}</div>
            </div>
            ${isImage && att.data ? `<img class="attachment-preview" src="${att.data}" onclick="window.open(this.src)" title="Büyütmek için tıklayın">` : ''}
            ${hasDrive ? `<button class="btn-cancel" onclick="window.open('${att.driveUrl || 'https://drive.google.com/file/d/' + att.driveFileId + '/view'}')" title="Drive'da Aç"><span class="material-icons-outlined" style="font-size:16px">open_in_new</span></button>` : ''}
            ${att.data ? `<button class="btn-cancel" onclick="downloadAttachment(${idx})" title="İndir"><span class="material-icons-outlined" style="font-size:16px">download</span></button>` : ''}
            <button class="btn-cancel" onclick="removeAttachment(${idx})" title="Kaldır"><span class="material-icons-outlined" style="font-size:16px">close</span></button>`;
        c.appendChild(el);
    });
}

function downloadAttachment(idx) {
    const card = getCurrentCard(); if (!card) return;
    const att = card.attachments[idx];
    const a = document.createElement('a'); a.href = att.data; a.download = att.name; a.click();
}

function removeAttachment(idx) { const c = getCurrentCard(); if (c) { c.attachments.splice(idx, 1); saveState(); renderAttachments(c); renderBoard(); } }

// ===== COMMENTS =====
function renderComments(card) {
    if (!card.comments) card.comments = [];
    const c = document.getElementById('commentsList'); c.innerHTML = '';
    card.comments.slice().reverse().forEach(comment => {
        const el = document.createElement('div'); el.className = 'comment';
        el.innerHTML = `<div class="comment-avatar">${comment.author ? comment.author.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : 'ME'}</div><div class="comment-body"><span class="comment-author">${escapeHtml(comment.author || 'Ben')}</span><span class="comment-date">${new Date(comment.date).toLocaleString('tr-TR')}</span><div class="comment-text">${escapeHtml(comment.text)}</div></div>`;
        c.appendChild(el);
    });
}

function addComment() {
    const input = document.getElementById('commentInput'); if (!input.value.trim()) return;
    const c = getCurrentCard(); if (c) {
        if (!c.comments) c.comments = [];
        const authorName = currentUser ? (currentUser.displayName || currentUser.email) : 'Ben';
        c.comments.push({ author: authorName, text: input.value.trim(), date: new Date().toISOString() });
        input.value = ''; saveState(); renderComments(c); renderBoard();
    }
}

// ===== CARD ACTIONS =====
function deleteCard() { if (!confirm('Bu kartı silmek istediğinize emin misiniz?')) return; const b = getActiveBoard(), lid = document.getElementById('cardModal').dataset.listId, l = b.lists.find(x => x.id === lid); l.cards = l.cards.filter(c => c.id !== currentCardId); saveState(); closeModal(); renderBoard(); }
function toggleArchiveCard() { const c = getCurrentCard(); if (c) { c.archived = !c.archived; saveState(); closeModal(); renderBoard(); showToast(c.archived ? 'Kart arşivlendi' : 'Arşivden çıkarıldı'); } }
function copyCard() { const c = getCurrentCard(); if (!c) return; const b = getActiveBoard(), lid = document.getElementById('cardModal').dataset.listId, l = b.lists.find(x => x.id === lid), cp = JSON.parse(JSON.stringify(c)); cp.id = generateId(); cp.title += ' (Kopya)'; l.cards.push(cp); saveState(); renderBoard(); showToast('Kopyalandı'); }
function moveCard() {
    const b = getActiveBoard(), clid = document.getElementById('cardModal').dataset.listId, others = b.lists.filter(l => l.id !== clid);
    if (!others.length) return;
    const target = prompt('Hedef liste:\n' + others.map(l => '- ' + l.name).join('\n'));
    const tl = others.find(l => l.name.toLowerCase() === target?.toLowerCase());
    if (tl) { const sl = b.lists.find(l => l.id === clid), ci = sl.cards.findIndex(c => c.id === currentCardId), [card] = sl.cards.splice(ci, 1); tl.cards.push(card); saveState(); closeModal(); renderBoard(); showToast('Taşındı'); }
}

// ===== BOARD OPERATIONS =====
function addNewBoard() {
    const name = prompt('Yeni pano adı:'); if (!name?.trim()) return;
    state.boards.push({ id: generateId(), name: name.trim(), labels: JSON.parse(JSON.stringify(DEFAULT_LABELS)), lists: [{ id: generateId(), name: 'Yapılacaklar', cards: [] }, { id: generateId(), name: 'Devam Eden', cards: [] }, { id: generateId(), name: 'Tamamlanan', cards: [] }] });
    state.activeBoardId = state.boards[state.boards.length - 1].id; saveState(); renderBoardTabs(); renderBoard();
}

function showBoardContextMenu(e, id) {
    e.preventDefault();
    const menu = document.getElementById('contextMenu');
    menu.innerHTML = `<button class="context-menu-item" onclick="renameBoard('${id}')"><span class="material-icons-outlined">edit</span> Yeniden adlandır</button><div class="context-menu-divider"></div><button class="context-menu-item danger" onclick="deleteBoard('${id}')"><span class="material-icons-outlined">delete</span> Panoyu sil</button>`;
    menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px'; menu.classList.add('active');
    setTimeout(() => { const close = () => { menu.classList.remove('active'); document.removeEventListener('click', close); }; document.addEventListener('click', close); }, 0);
}

function renameBoard(id) { const b = state.boards.find(x => x.id === id), n = prompt('Yeni pano adı:', b.name); if (n?.trim()) { b.name = n.trim(); saveState(); renderBoardTabs(); } document.getElementById('contextMenu').classList.remove('active'); }
function deleteBoard(id) { if (state.boards.length <= 1) { showToast('Son pano silinemez', 'warning'); return; } if (!confirm('Silmek istediğinize emin misiniz?')) return; state.boards = state.boards.filter(b => b.id !== id); if (state.activeBoardId === id) state.activeBoardId = state.boards[0].id; saveState(); renderBoardTabs(); renderBoard(); document.getElementById('contextMenu').classList.remove('active'); }

// ===== SEARCH =====
function searchCards(q) {
    const cards = document.querySelectorAll('.card');
    if (!q.trim()) { cards.forEach(c => c.classList.remove('search-hidden')); return; }
    const ql = q.toLowerCase(), board = getActiveBoard();
    cards.forEach(el => {
        let found = false;
        board.lists.forEach(l => { const c = l.cards.find(x => x.id === el.dataset.cardId); if (c && (c.title.toLowerCase().includes(ql) || (c.description || '').toLowerCase().includes(ql))) found = true; });
        el.classList.toggle('search-hidden', !found);
    });
}

// ===== IMPORT / EXPORT =====
function exportBoard() {
    const data = JSON.stringify({ boards: state.boards, exportDate: new Date().toISOString() }, null, 2);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' })); a.download = `mencboard_${new Date().toISOString().slice(0, 10)}.json`; a.click();
    showToast('Yedek indirildi', 'success');
}

function importBoard() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if (data.boards) { state.boards = data.boards; state.activeBoardId = state.boards[0]?.id; saveState(); renderBoardTabs(); renderBoard(); showToast('Yedek yüklendi', 'success'); }
                else showToast('Geçersiz dosya formatı', 'error');
            } catch (e) { showToast('Dosya okunamadı', 'error'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeModal(); document.getElementById('contextMenu').classList.remove('active'); }
});

// ===== INIT =====
// Auth state listener (onAuthStateChanged) handles initialization:
// - Logged in: loadStateFromFirebase() → renderBoardTabs() → renderBoard()
// - Not logged in: login screen shown
// No direct calls needed here.
</script>
